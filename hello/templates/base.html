<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Teacher Dashboard{% endblock %}</title>
    <style>
      /* Reset and Base Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background-color: #f5f5f5;
        color: #333;
        line-height: 1.6;
      }

      /* Navigation Bar */
      .navbar {
        background-color: #2c3e50;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .navbar-brand {
        color: white;
        font-size: 16px;
        font-weight: 500;
      }

      .navbar-menu {
        display: flex;
        gap: 10px;
      }

      .navbar-menu a {
        background-color: #3b5998;
        color: white;
        text-decoration: none;
        padding: 10px 20px;
        border-radius: 4px;
        font-size: 14px;
        transition: background-color 0.2s;
      }

      .navbar-menu a:hover {
        background-color: #4a6cb3;
      }

      .navbar-menu a.active {
        background-color: #2980b9;
      }

      /* Main Content Container */
      .main-content {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px;
      }

      /* Common Section Styles */
      .section-title {
        font-size: 18px;
        font-weight: 600;
        color: #333;
        margin-bottom: 15px;
        border-bottom: 2px solid #333;
        padding-bottom: 5px;
      }

      /* Utility Classes */
      .mb-30 {
        margin-bottom: 30px;
      }
    </style>
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="navbar-brand">Dashboard / Home</div>
      <div class="navbar-menu">
        <a href="#" class="active">Dashboard</a>
        <a href="#">My Markbooks</a>
        <a href="#">Unit Outlines</a>
        <a href="#">Calendar</a>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">{% block content %}{% endblock %}</main>

    {% block extra_js %}{% endblock %}
  </body>
</html>
