<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Teacher Dashboard{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #fff; color: #333; line-height: 1.5; }
        .navbar { background: #2c3e50; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { color: #fff; font-size: 14px; }
        .navbar-menu { display: flex; gap: 8px; }
        .navbar-menu a { color: #fff; text-decoration: none; padding: 6px 14px; font-size: 13px; border: 1px solid #fff; }
        .navbar-menu a.active { background: #fff; color: #2c3e50; }
        .navbar-menu a:hover { background: rgba(255,255,255,0.2); }
        .main-content { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .section-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
        .mb-20 { margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; font-size: 13px; }
        th { background: #eee; font-weight: bold; }
        .btn { padding: 6px 14px; border: 1px solid #333; background: #fff; cursor: pointer; font-size: 13px; text-decoration: none; color: #333; display: inline-block; }
        .btn:hover { background: #eee; }
        .btn-primary { background: #2c3e50; color: #fff; border-color: #2c3e50; }
        .btn-primary:hover { background: #1a252f; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">Teacher Portal</div>
        <div class="navbar-menu">
            <a href="{% url 'teacher_portal:dashboard' %}" class="{% if active_nav == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="{% url 'teacher_portal:markbook' %}" class="{% if active_nav == 'markbook' %}active{% endif %}">My Markbooks</a>
            <a href="{% url 'teacher_portal:unit_outline' %}" class="{% if active_nav == 'unit_outlines' %}active{% endif %}">Unit Outlines</a>
            <a href="{% url 'teacher_portal:calendar' %}" class="{% if active_nav == 'calendar' %}active{% endif %}">Calendar</a>
        </div>
    </nav>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    {% block extra_js %}{% endblock %}
</body>
</html>
